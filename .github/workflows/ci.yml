name: ci
on: [push, pull_request]

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - run: uv sync --all-extras --dev

      - name: lint
        run: |
          uv run ruff check .
          uv run ruff format --check .

      - name: typecheck
        run: uv run mypy

      - name: test
        run: uv run pytest -q

      - name: build
        run: uv build
